<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Not found — Ouranoco</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f6f3ec; --ink: #111315; --mute: #51565e; --dim: #8a8f98;
  }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter Tight", sans-serif;
    display: grid;
    place-items: center;
    padding: 2rem;
    text-align: center;
  }
  .mark {
    width: 3.5rem;
    height: 3.5rem;
    margin: 0 auto 2.5rem;
    display: block;
  }
  .mark circle,
  .mark path {
    fill: none;
    stroke: var(--ink);
    stroke-width: 7;
  }
  .mark path {
    stroke-linejoin: miter;
    stroke-linecap: butt;
  }
  .code {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 300;
    color: var(--dim);
    font-size: 0.95rem;
    letter-spacing: 0.2em;
    margin-bottom: 1.25rem;
    text-transform: uppercase;
  }
  h1 {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3rem);
    letter-spacing: -0.025em;
    margin: 0 0 1rem;
    max-width: 22ch;
    line-height: 1.1;
  }
  p {
    color: var(--mute);
    max-width: 42ch;
    margin: 0 auto 2.25rem;
    line-height: 1.6;
  }
  a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid rgba(17,19,21,0.2);
    padding-bottom: 2px;
    font-size: 0.95rem;
    transition: color 0.2s, border-color 0.2s;
  }
  a:hover { color: #0b3c5d; border-color: #0b3c5d; }
</style>
</head>
<body>
  <main>
    <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
      <circle cx="50" cy="50" r="40"/>
      <path d="M 50 22 L 72 22 L 72 72 L 28 72 L 28 38 L 60 38 L 60 60 L 42 60 L 42 50"/>
    </svg>
    <div class="code">Error 404</div>
    <h1>This page appears to have taken off without us.</h1>
    <p>The page you're looking for isn't here. It may have moved, or never existed at all.</p>
    <a href="/">Return to ourano.co</a>
  </main>
</body>
</html>
